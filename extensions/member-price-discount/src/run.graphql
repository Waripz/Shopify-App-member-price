query RunInput {
  cart {
    buyerIdentity {
      customer {
        id
      }
    }
    lines {
      id
      quantity
      cost {
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            metafield(namespace: "custom", key: "member_price") {
              value
            }
          }
        }
      }
    }
  }
}