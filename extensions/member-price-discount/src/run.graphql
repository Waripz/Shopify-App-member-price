query RunInput {
  cart {
    buyerIdentity {
      customer {
        # Matches your screenshot exactly
        metafield(namespace: "custom", key: "imanist_loyalty_enrolled_date") {
          value
        }
      }
    }
    lines {
      quantity
      cost {
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            # Matches your screenshot exactly
            metafield(namespace: "custom", key: "member_price") {
              value
            }
          }
        }
      }
    }
  }
}