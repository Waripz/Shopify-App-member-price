query RunInput {
  cart {
    buyerIdentity {
      customer {
        metafield(namespace: "loyaltylion", key: "enroll_date") {
          value
        }
      }
    }
    lines {
      id # <--- THIS WAS MISSING. Add this line!
      quantity
      cost {
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            metafield(namespace: "custom", key: "member_price") {
              value
            }
          }
        }
      }
    }
  }
}